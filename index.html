// SVG flags
function flagSVG(code) {
  const w = 20, h = 13;
  const a = `width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"`;
  const v3 = (c1,c2,c3) => `<svg ${a} viewBox="0 0 3 2"><rect x="0" width="1" height="2" fill="${c1}"/><rect x="1" width="1" height="2" fill="${c2}"/><rect x="2" width="1" height="2" fill="${c3}"/></svg>`;
  const hz3 = (c1,c2,c3) => `<svg ${a} viewBox="0 0 3 2"><rect y="0" width="3" height="0.667" fill="${c1}"/><rect y="0.667" width="3" height="0.667" fill="${c2}"/><rect y="1.333" width="3" height="0.667" fill="${c3}"/></svg>`;
  switch(code) {
    case "fr": return v3("#0055A4","#FFFFFF","#EF4135");
    case "it": return v3("#008C45","#F4F5F0","#CD212A");
    case "de": return hz3("#000000","#DD0000","#FFCE00");
    case "hu": return hz3("#CD2A3E","#FFFFFF","#436F4D");
    case "es": return `<svg ${a} viewBox="0 0 3 2"><rect width="3" height="2" fill="#AA151B"/><rect y="0.5" width="3" height="1" fill="#F1BF00"/></svg>`;
    case "pt": return `<svg ${a} viewBox="0 0 60 40"><rect width="60" height="40" fill="#046A38"/><rect x="24" width="36" height="40" fill="#DA291C"/><circle cx="24" cy="20" r="7" fill="#FFD100"/><circle cx="24" cy="20" r="3.2" fill="#DA291C"/></svg>`;
    case "pt-br": return `<svg ${a} viewBox="0 0 4 3"><rect width="4" height="3" fill="#009C3B"/><polygon points="2,0.25 3.8,1.5 2,2.75 0.2,1.5" fill="#FFDF00"/><circle cx="2" cy="1.5" r="0.72" fill="#002776"/></svg>`;
    case "en": return `<svg ${a} viewBox="0 0 60 30"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="2"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>`;
    default: return "";
  }
}

let currentLang = "pt";
try { const s = localStorage.getItem("illes_lang"); if (s && t[s]) currentLang = s; } catch(e) {}

function render(lang) {
  currentLang = lang;
  try { localStorage.setItem("illes_lang", lang); } catch(e) {}
  const tr = t[lang];
  document.documentElement.lang = lang;

  // Nav pills
  document.getElementById("lang-pills").innerHTML = langs.map(L =>
    `<button class="pill${L.code===lang?" active":""}" onclick="render('${L.code}')" aria-label="${L.label}">
      ${flagSVG(L.code)}${L.extraFlag ? ' '+flagSVG(L.extraFlag) : ''} ${L.label}
    </button>`
  ).join("");

  // Hero
  document.getElementById("hero-kicker").textContent = tr.kicker;
  document.getElementById("hero-lead").textContent = tr.heroLead;
  document.getElementById("hero-body").textContent = tr.heroBody;
  const cta = document.getElementById("hero-cta");
  cta.textContent = tr.contactTitle;
  cta.insertAdjacentHTML("beforeend", ' <span style="font-size:18px">→</span>');

  // Language USP
  document.getElementById("langs-body").textContent = tr.langsBody;
  document.getElementById("lang-cards").innerHTML = langs.map(L =>
    `<button class="lang-card${L.code===lang?" active":""}" onclick="render('${L.code}')" aria-label="${L.label}">
      <span class="lang-card-hello">${L.hello}</span>
      <span class="lang-card-label">${L.label}</span>
    </button>`
  ).join("");

  // Approach
  document.getElementById("approach-kicker").textContent = tr.approachTitle;
  document.getElementById("approach-body").textContent = tr.approachBody;

  // Offer
  document.getElementById("offer-kicker").textContent = tr.offerTitle;
  document.getElementById("offer-body").innerHTML = tr.offerBody;
  document.getElementById("methods-title").textContent = tr.methodsTitle;
  document.getElementById("methods-list").innerHTML =
    (tr.methodsPrimary || []).map(m => `<span class="method-tag-primary">${m}</span>`).join("") +
    (tr.methods || []).map(m => `<span class="method-tag">${m}</span>`).join("");

  // Focus
  document.getElementById("focus-title").textContent = tr.focusTitle;
  document.getElementById("focus-list").innerHTML = tr.focus.map(f =>
    `<span class="focus-tag">${f}</span>`
  ).join("");

  // Practical
  document.getElementById("practical-title").textContent = tr.practicalTitle;
  document.getElementById("hours-label").textContent = tr.hoursLabel;
  document.getElementById("hours-value").innerHTML = tr.hoursValue;
  document.getElementById("fees-label").textContent = tr.feesLabel;
  document.getElementById("fees-value").textContent = tr.feesValue;
  document.getElementById("insurance-label").textContent = tr.insuranceLabel;
  document.getElementById("insurance-value").textContent = tr.insuranceValue;
  document.getElementById("access-label").textContent = tr.accessLabel;
  document.getElementById("access-value").textContent = tr.accessValue;
  document.getElementById("address-label").textContent = tr.addressLabel;
  document.getElementById("address-value").textContent = tr.addressValue;
  document.getElementById("tel-label").textContent = tr.telLabel;
  document.getElementById("email-label").textContent = tr.emailLabel;

  // Contact
  document.getElementById("contact-title").textContent = tr.contactTitle;
  document.getElementById("contact-body").textContent = tr.contactBody;
  document.getElementById("f-name").placeholder = tr.fName;
  document.getElementById("f-email").placeholder = tr.fEmail;
  document.getElementById("f-phone").placeholder = tr.fPhone;
  document.getElementById("f-concern").placeholder = tr.fConcern;
  document.getElementById("f-submit").textContent = tr.fSubmit;
}

// Contact form submit → mailto
document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();
  const tr = t[currentLang];
  const form = e.target;
  const name    = form.querySelector("#f-name").value;
  const email   = form.querySelector("#f-email").value;
  const phone   = form.querySelector("#f-phone").value;
  const concern = form.querySelector("#f-concern").value;

  const subject = encodeURIComponent(tr.contactTitle + (name ? " – " + name : ""));
  let body = "";
  if (name)    body += "Name: " + name + "\n";
  if (email)   body += "E-Mail: " + email + "\n";
  if (phone)   body += "Tel: " + phone + "\n";
  if (concern) body += "\n" + concern;

  window.location.href = "mailto:dr.peter.illes@hin.ch?subject=" + subject + "&body=" + encodeURIComponent(body);

  form.style.display = "none";
  const thanks = document.getElementById("form-thanks");
  thanks.textContent = tr.fThanks;
  thanks.style.display = "block";
});

render(currentLang);
</script>
